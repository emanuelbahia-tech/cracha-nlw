<!DOCTYPE html>

<html lang= "pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Marcelo Alvarenga - DoWhile 2021</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div class="container">
        <div class="avatar">
          <span>
            <img src="images/selo.svg" alt="Selo RocketSeat" />
          </span>
          <img src="images/Marcelo.jpeg" alt="Foto Pessoal" id="userImage" />
        </div>
        <h1 id="userName">Emanuel Bahia</h1>
        <a id="userLink" target="_blank" href="https://github.com/emanuelbahia-tech">
          <img src="images/github.svg" alt="ícone github" />
          <span id="userLogin">emanuelbahia-tech</span>
        </a>

        <p id="userBio">
          An instructor focused on helping people start programming for web
        </p>

        <ul id="socialLinks">
          <li class="youtube">
            <a target="_blank" href="http://youtube.com">
              <img src="images/youtube.svg" alt="ícone youtube" />
            </a>
          </li>
          <li class="instagram">
            <a target="_blank" href="http://instagram.com/">
              <img src="images/instagram.svg" alt="ícone instagram" />
            </a>
          </li>
          <li class="facebook">
            <a target="_blank" href="https://www.facebook.com/">
              <img src="images/facebook.svg" alt="ícone facebook" />
            </a>
          </li>
          <li class="twitter">
            <a target="_blank" href="http://twitter.com">
              <img src="images/twitter.svg" alt="ícone twitter" />
            </a>
          </li>
        </ul>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
